<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貸款精算小助手</title>

    <!-- 引用外部的 style.css -->
    <link rel="stylesheet" href="css/style.css">

    <!-- 引用外部的 utils.js -->
    <script src="js/utils.js"></script>

</head>

<body>
    <!-- div是一個 HTML 的「通用容器元素」，本身沒有語義，只是用來把其他元素包起來
     ，方便做分組、排版或套用樣式。它預設是塊級元素，會佔滿整行寬度。 -->
    <!-- div.container or .container 可快速輸出 -->
    <div class="container">

        <h1>貸款精算小助手
            <span class="subtitle">輸入條件，快速分析您的還款計畫</span>
        </h1>

        <!-- form表單_條件區 -->
        <form id="loanForm" action="" class="loan-form">

            <!-- 不用br，改用div排版 -->
            <div class="form-row">
                <label for="amount">貸款金額</label>
                <input required type="number" id="amount" name="amount" value="100" step="10" min="10"> 萬
            </div>

            <div class="form-row">
                <label for="rate">貸款利率</label>
                <input required type="number" id="rate" name="rate" value="1.85" step="0.01" min="1"> %
            </div>

            <div class="form-row">
                <label for="loanYears">貸款年限</label>
                <select name="loanYears" id="loanYears">
                    <option value="3">3</option>
                    <option value="5">5</option>
                    <option value="7" selected>7</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                    <option value="40">40</option>
                </select> 年
            </div>

            <div class="form-row">
                <label for="repayment">還款方式</label>
                <input type="radio" id="repayment1" name="repayment" value="repaymentMethod1">本金平均攤還
                <input type="radio" id="repayment2" name="repayment" value="repaymentMethod2">本息平均攤還
            </div>

            <!-- 改type="button"，因為：前端溝通時不需要type="submit" -->
            <!-- <button type="button" id="clacBtn">計算</button> -->
        </form>


        <!-- table表格_試算區 -->
        <div class="result">

            <h2>ᓚᘏᗢ 試算結果
                <!-- CSV 按鈕 -->
                <button id="exportBtn" type="button"> 匯出 CSV </button>
            </h2>

            <!-- 摘要表格 -->
            <table class="summary-table">
                <thead>
                    <tr>
                        <th>項目</th>
                        <th>金額</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>第1個月還款金額</td>
                        <td id="monthlyPayment"></td>
                    </tr>
                    <tr>
                        <td>總還款金額</td>
                        <td id="totalPayment"></td>
                    </tr>
                    <tr>
                        <td>總利息支出</td>
                        <td id="totalInterest"></td>
                    </tr>
                </tbody>
            </table>

            <!-- 分期明細表格 -->
            <!-- CSS 捲動條（Scrollbar） 新增一個容器包住表格 -->
            <div id="table-container">

                <table class="detial-table">
                    <thead>
                        <tr>
                            <th>期數</th>
                            <th>月付額</th>
                            <th>攤還本金</th>
                            <th>攤還利息</th>
                            <th>貸款餘額</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleBody">
                        <!-- JavaScript區塊=> function renderTable(schedules) -->
                    </tbody>
                </table>

            </div>
            <!-- CSS 捲動條（Scrollbar）結束處 -->
        </div>
    </div>

    <!-- 標註作者、指導老師、協作、版本資訊、更新日期 -->
    <footer>
        <div class="footer-content">
            <p>Developed by: irw | Instructor: Jerry Chen (陳岳洋)</p>

            <p class="collab-info">Collaborated with: Gemini & Copilot</p>

            <p class="version-info">
                <span>Version: Loan Calculator V1.0</span>
                <span class="divider">|</span>
                <span id="update-info"></span>
            </p>
        </div>
    </footer>

    <!-- JavaScript 動態填入 -->
    <script>
        // 全域
        let schedules = [];

        // 宣告常數變數，並把網頁中 id 的元素存進去；document.querySelector (# id名稱)==>用來取得物件
        const amountEl = document.querySelector("#amount");
        const rateEl = document.querySelector("#rate");
        const loanYearsEl = document.querySelector("#loanYears");
        // const clacBtnEl = document.querySelector("#clacBtn");                  // 計算按鈕
        const exportBtnEl = document.querySelector("#exportBtn");              // 輸出CSV

        // console.log(amountEl, rateEl, loanYearsEl, clacBtnEl, exportBtnEl);    // 後端顯示物件
        console.log(amountEl, rateEl, loanYearsEl, exportBtnEl);    // 後端顯示物件

        // 取得所有的 radio 按鈕
        const repaymentRadios = document.querySelectorAll("input[name='repayment']");

        // 對每一個 radio 綁定監聽
        repaymentRadios.forEach(radio => {
            radio.addEventListener("change", function (e) {
                // 直接執行「更新畫面」的總函式，不需要傳參數
                updateAll();
            });
        }); // repaymentRadios.forEach() 結束處

        // 綁定給輸入框 (輸入時自動更新)
        amountEl.addEventListener("input", updateAll);
        rateEl.addEventListener("input", updateAll);
        loanYearsEl.addEventListener("input", updateAll);

        // 匯出 CSV；.addEventListener()用來**「監聽」並「反應」使用者動作**的橋樑
        exportBtnEl.addEventListener("click", function (e) {
            // console.log("click!");  // 檢測是否成功取得物件

            // 空值，出現警告視窗 alert();
            if (schedules.length === 0) {
                alert("目前無資料。\n\n1. 請確認輸入條件是否為空。\n2. 點擊還款方式【２擇１】。\n\n才會計算出數據呦！");
                return;
            }

            const headers = ["期數", "月付額", "攤還本金", "攤還利息", "貸款餘額"]    // 欄標題列

            // 組裝 CSV 格式（2維資料），有２種計算方式
            // 方式1：for廻圈
            let data = [];                                                         // 2維資料列
            for (let i = 0; i < schedules.length; i++) {
                data.push(
                    [
                        schedules[i].month,
                        schedules[i].monthlyPayment,
                        schedules[i].principal,
                        schedules[i].interest,
                        schedules[i].balance,
                    ]
                );
            } // for 結束處

            // // 方式2：schedules.map(...)把 schedules 裡的每一個物件，都轉換成一個陣列
            // let data = schedules.map(item => [
            //     item.month,
            //     item.monthlyPayment,
            //     item.principal,
            //     item.interest,
            //     item.balance
            // ]);

            console.log(`CSV 2維格式`);
            console.log(data);

            // 呼叫外部引用的 utils.js 裡的函式downloadCSV()
            downloadCSV(headers, data);

        }); // exportBtnEl.addEventListener() 結束處


        // 把資料算好，然後分發給摘要區和表格區
        function updateAll() {
            // 檢查有沒有填資料（防錯）
            if (amountEl.value === "" || rateEl.value === "" || loanYearsEl.value === "") {
                return; // 資料不齊，直接結束，不往下算
            }

            let amount = amountEl.value;                // 元件.值：取得輸入的 貸款金額
            let rate = rateEl.value;                    // 取得輸入的 貸款年利率
            let loanYears = loanYearsEl.value;          // 取得輸入的 貸款期數

            // 取得選中的還款方式
            let checkedRadio = document.querySelector("input[name='repayment']:checked");
            if (!checkedRadio) return;
            let method = checkedRadio.value;

            console.log(`前端輸入值=> 貸款金額:${amount}萬 貸款利率:${rate} 貸款年限:${loanYears} 還款方式:${method}`);
            console.log("正在自動計算...");

            if (method === "repaymentMethod1") {
                schedules = repaymentMethod1(amount * 10000, rate, loanYears);
            } else if (method === "repaymentMethod2") {
                schedules = repaymentMethod2(amount * 10000, rate, loanYears);
            }
            // 呼叫 摘要表格函式
            renderSummary(schedules);

            // 呼叫 渲染表格函式
            renderTable(schedules);

        } // 函式 function updateAll 的結束大括號


        // 函式區==> 摘要表格==> 計算公式區
        function renderSummary(schedules) {
            const monthlyPaymentEl = document.querySelector("#monthlyPayment");
            const totalPaymentEl = document.querySelector("#totalPayment");
            const totalInterestEl = document.querySelector("#totalInterest");

            console.log(monthlyPaymentEl, totalPaymentEl, totalInterestEl);    // 後端顯示物件

            // 摘要表格：月付額、利息加總，有２種計算方式
            // // 方式1：for廻圈
            // let totalPrincipal = 0; totalInterest = 0;            //初始化
            // for (let i = 0; i < schedules.length; i++) {
            //     totalPrincipal += schedules[i].monthlyPayment;    // 月付額加總
            //     totalInterest += schedules[i].interest;           // 利息加總                
            // }

            // 方式2：.reduce()陣列方法，可以把所有元素累加起來
            let totalPrincipal = schedules.reduce((sum, item) => sum + item.monthlyPayment, 0);     // 月付額加總
            let totalInterest = schedules.reduce((sum, item) => sum + item.interest, 0);            // 利息加總

            console.log(`攤還本金總和：${totalPrincipal} 攤還利息總和：${totalInterest}`);            // 加總結果

            // 前端 摘要表格 顯示；放進 click 事件的函式內 .toLocaleString()加上千分位
            monthlyPaymentEl.innerText = `${schedules[0].monthlyPayment.toLocaleString()} 元`;
            totalPaymentEl.innerText = `${totalPrincipal.toLocaleString()} 元`;
            totalInterestEl.innerText = `${totalInterest.toLocaleString()} 元`;

        } // 函式 renderSummary 的結束大括號


        // 繪製(渲染)表格
        function renderTable(schedules) {
            // 宣告空串列
            let tableHtml = "";

            for (let i = 0; i < schedules.length; i++) {
                let p = schedules[i]
                // .toLocaleString()加上千分位
                tableHtml += `
                    <tr>
                        <td> ${p.month} </td>
                        <td> ${p.monthlyPayment.toLocaleString()} </td>
                        <td> ${p.principal.toLocaleString()} </td>
                        <td> ${p.interest.toLocaleString()} </td>
                        <td> ${p.balance.toLocaleString()} </td>
                    </tr>
                `;
            }

            // 看表格 tr, td 結構 ==> 在 clacBtnEl.addEventListener() 裡呼叫函式
            // console.log(tableHtml);

            // document.querySelector()：從 HTML 網頁中抓取符合特定條件的第一個元素==> 抓取 id 為 scheduleBody
            // .innerHTML：用來 讀取 或 改變 HTML 元素「內部 HTML 內容」的一個屬性
            document.querySelector("#scheduleBody").innerHTML = tableHtml;  //前端顯示

        }  // 函式 renderTable 的結束大括號


        // 函式區==> (本金平均攤還)分期明細表格==> 計算公式區
        // 參考網站 https://www.taishinbank.com.tw/TSB/personal/trial/housing/housing2/
        function repaymentMethod1(amount, rate, years) {
            let monthRate = rate / 100 / 12;               // 月利率
            let months = years * 12;                       // 總期數
            let principal = amount / months;               // 攤還本金(固定)

            // 後端顯示
            console.log(`本金平均攤還`);
            console.log(`月利率：${monthRate} 總期數：${months} 攤還本金(固定)：${principal}`);

            // 初始化 
            let balance = amount;  // 貸款餘額

            // 空陣列：存每一期的資料
            schedules = [];

            for (let i = 0; i < months; i++) {
                let interest = balance * monthRate;         // 當期利息（= 前期本金 ＊ 月利率）
                let monthlyPayment = principal + interest   // 月付額（= 攤還本金 ＋ 當期利息）
                balance -= principal;                       // 更新貸款餘額（= 前期貸款餘額 － 當期攤還本金）逐期扣除

                // 判斷是否為最後一期，處理最後一期的問題
                if (i === months - 1) {
                    console.log(`最後一期 => 攤還本金(固定)：${principal} 貸款餘額：${balance}`);
                    principal += balance;                   // 最後一期的本金11904 + 最後一期的還款餘額7
                    balance = 0;                            // 最後一期 貸款餘額 直接強行歸零
                }

                // 後端顯示
                // console.log(`第${i + 1}期 月付額：${monthlyPayment} 攤還本金(固定)：${principal} 攤還利息：${interest} 貸款餘額：${balance}`);

                // .push()用來操作 陣列（Array） 的方法，「將一個或多個元素添加到陣列的末尾」
                schedules.push(
                    {
                        "month": i + 1,                                // 期數
                        "monthlyPayment": Math.round(monthlyPayment),  // 月付額(本金+利息)
                        "principal": Math.round(principal),            // 攤還本金(固定)
                        "interest": Math.round(interest),              // 攤還利息
                        "balance": Math.round(balance),                // 貸款餘額
                    }
                );
            }

            console.log(schedules);   // 後端顯示schedules明細結果 == Pythone的print
            return schedules;         // (與上方一樣的結果)將陣列 return 出去

        } // 函式 repaymentMethod1 的結束大括號

        // 函式區==> (本息平均攤還)分期明細表格==> 計算公式區
        // 參考網站 https://www.taishinbank.com.tw/TSB/personal/trial/housing/housing1/
        function repaymentMethod2(amount, rate, years) {
            let monthRate = rate / 100 / 12;                                               // 月利率
            let months = years * 12;                                                       // 總期數
            let monthlyPayment = amount * monthRate * Math.pow(1 + monthRate, months) /
                (Math.pow(1 + monthRate, months) - 1);                                     // 月付額(固定) 「次方運算」函式：Math.pow(2, 3); 結果是 8，因為 2^3 = 8

            // 後端顯示
            console.log(`本息平均攤還`);
            console.log(`月利率：${monthRate} 總期數：${months} 月付額(固定)：${monthlyPayment}`);

            // 初始化
            let balance = amount;  // 貸款餘額

            // 空陣列：存每一期的資料
            schedules = [];

            for (let i = 0; i < months; i++) {
                let interest = balance * monthRate;                                       // 當期利息（= 前期還款餘額 ＊ 月利率）
                let principal = (amount * monthRate * Math.pow(1 + monthRate, months) /
                    (Math.pow(1 + monthRate, months) - 1)) - (balance * monthRate);       // 攤還本金（= 月付額(固定) － 當期利息）
                balance -= principal;                                                     // 更新貸款餘額（= 前期貸款餘額 － 當期攤還本金）逐期扣除

                // 判斷是否為最後一期，處理最後一期的問題
                if (i === months - 1) {
                    console.log(`最後一期 => 攤還本金：${principal} 貸款餘額：${balance}`);
                    principal += balance;                                                 // 最後一期的本金12682 + 最後一期的還款餘額7
                    balance = 0;                                                          // 最後一期 貸款餘額 直接強行歸零
                }

                // 後端顯示
                // console.log(`第${i + 1}期 月付額(固定)：${monthlyPayment} 攤還本金：${principal} 攤還利息：${interest} 貸款餘額：${balance}`);

                // .push()用來操作 陣列（Array） 的方法，「將一個或多個元素添加到陣列的末尾」
                schedules.push(
                    {
                        "month": i + 1,                                   // 期數
                        "monthlyPayment": Math.round(monthlyPayment),     // 月付額(固定)
                        "principal": Math.round(principal),               // 攤還本金
                        "interest": Math.round(interest),                 // 攤還利息
                        "balance": Math.round(balance),                   // 貸款餘額
                    }
                );

            }

            console.log(schedules);   // 後端顯示schedules明細結果 == Pythone的print            
            return schedules;         // (與上方一樣的結果)將陣列 return 出去

        } // 函式 repaymentMethod2 的結束大括號

        // 動態顯示更新資訊
        function displayUpdateInfo() {
            const updateElement = document.getElementById('update-info');
            const today = new Date();

            // 取得 YYYY-MM-DD 格式
            const dateString = today.toLocaleDateString('en-CA');

            // 填入純英文文字
            if (updateElement) {
                updateElement.textContent = `Last Update: ${dateString}`;
            }
        } // 函式 displayUpdateInfo() 的結束大括號


        // 確保頁面載入後執行
        window.addEventListener('load', displayUpdateInfo);
    </script>
</body>

</html>
