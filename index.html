<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貸款試算APP V1.0</title>

    <style>
        /* 「*」全域設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background-color: #f4fbff;
            padding: 24px;
            color: #1e2c3b;
        }

        /* 單位rem會隨著瀏覽器自動縮放，不用px比較好 */
        h1 {
            font-size: 1.6rem;
            color: #063e5f;
            margin-bottom: 1rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .loan-form,
        .result {
            background-color: #ffffff;
            border-radius: 20px;
            margin-bottom: 24px;
            padding: 24px;
            /* rgb第4個值代表陰影的亮度 */
            /* box-shadow使用說明的參考網站：https://steam.oxxostudio.tw/category/css/content/box-shadow.html */
            box-shadow: 10px 10px;
        }

        .form-row {
            display: flex;
            /* 水平設定 */
            /* justify-content: left; */
            justify-content: center;
            /* 垂直設定 */
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .form-row label {
            width: 90px;
            font-weight: bold;
            color: #063e5f;
        }

        input[type="number"],
        select {
            padding: 8px 10px;
            border: 1px solid #b0d4ee;
            border-radius: 6px;
            font-size: 1rem;
            width: 180px;
        }

        #clacBtn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: 200;
            border-radius: 6px;
            border: none;
            background-color: #2589c9;
            color: #ffffff;
            cursor: pointer;
            /* 過渡動畫搭配 */
            transition: background-color 5.0s ease;
        }

        #clacBtn:hover {
            background-color: #0f4a6e;
        }

        input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #2589c9;
        }
    </style>
</head>

<body>
    <!-- 輸入法 .container 直接帶入 div -->
    <div class="container">

        <h1>貸款試算APP V1.0</h1>
        <hr>
        <form id="loanForm" action="" class="loan-form">

            <!-- 使用div區塊 + class -->
            <div class="form-row">
                <label for="amount">貸款金額</label>
                <input required type="number" id="amount" name="amount" value="100" step="10" min="10"> 萬
            </div>

            <div class="form-row">
                <label for="rate">貸款利率</label>
                <input required type="number" id="rate" name="rate" value="1.85" step="0.01" min="1"> %
            </div>

            <div class="form-row">
                <!-- 新增"貸款手續費" -->
                <label for="handlingFree">貸款手續費</label>
                <input required type="number" id="handlingFree" name="handlingFree" value="0" min="0"
                    placeholder="請輸入相關手續費"> 元
            </div>

            <div class="form-row">
                <label for="loanYears">貸款年限</label>
                <select name="loanYears" id="loanYears">
                    <option value="3">3</option>
                    <option value="5">5</option>
                    <option value="7" selected>7</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                    <option value="40">40</option>
                </select> 年
            </div>
            <div class="form-row">
                <label for="repayment">還款方式</label>
                <input type="radio" id="repayment1" name="repayment" value="repaymentMethod1" checked>本息平均攤還
                <input type="radio" id="repayment2" name="repayment" value="repaymentMethod2">本金平均攤還
            </div>
            <button type="submit" id="clacBtn">計算</button>
        </form>

        <div class="result">
            <h2>試算結果</h2>


            <!-- 摘要表格 -->
            <table border="1">
                <thead>
                    <tr>
                        <th>項目</th>
                        <th>金額</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>每月還款金額</td>
                        <td id="monthlyPayment">--</td>
                    </tr>
                    <tr>
                        <td>總還款金額</td>
                        <td id="totalPayment">--</td>
                    </tr>
                    <tr>
                        <td>總利息支出</td>
                        <td id="totalInterest">--</td>
                    </tr>
                </tbody>
            </table>

            <!-- 分期明細表格 -->
            <table border="1">
                <thead>
                    <tr>
                        <th>期數</th>
                        <th>月付金額</th>
                        <th>本金</th>
                        <th>利息</th>
                        <th>剩餘本金</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody">
                    <!-- JavaScript 動態填入 -->
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
